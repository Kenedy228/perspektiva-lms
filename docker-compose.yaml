services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lms-backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://lms:lms@postgres:5432/lms?sslmode=disable"
      SESSION_SECRET: "local-development-secret-change-me"
      SESSION_TTL: "8h"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_BUCKET: "lms"
      MINIO_PUBLIC_URL: ""
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lms-frontend
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8080"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:18
    container_name: lms-postgres
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
    ports:
      - "5433:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: lms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres18_data:
  minio_data:
